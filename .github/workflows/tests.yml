name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (from uv.lock)
        run: uv sync --frozen --extra dev --python 3.13

      - name: Run tests
        run: uv run pytest -q
