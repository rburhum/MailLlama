{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Tasks</h1>
<table class="w-full bg-white border rounded text-sm">
  <thead class="bg-gray-100"><tr class="text-left">
    <th class="p-2">#</th><th class="p-2">Kind</th><th class="p-2">Status</th>
    <th class="p-2">Progress</th><th class="p-2">Message</th><th class="p-2">Error</th>
  </tr></thead>
  <tbody>
  {% for t in tasks %}
    <tr id="task-{{ t.id }}" class="border-t"
        hx-get="/tasks/{{ t.id }}" hx-trigger="every 2s"
        hx-target="this" hx-swap="outerHTML">
      {% include '_task_row.html' %}
    </tr>
  {% else %}
    <tr><td colspan="6" class="p-4 text-center text-gray-500">No tasks yet.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
