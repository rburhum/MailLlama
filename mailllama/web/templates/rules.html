{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Rules (allow/block lists)</h1>

<form method="post" action="/rules/" class="bg-white border rounded p-4 mb-6 grid gap-2 md:grid-cols-5 text-sm">
  <select name="kind" class="border rounded p-1">
    <option value="blacklist">blacklist</option>
    <option value="whitelist">whitelist</option>
  </select>
  <select name="match_kind" class="border rounded p-1">
    <option value="email">email</option>
    <option value="domain">domain</option>
    <option value="header">header</option>
    <option value="regex">regex</option>
  </select>
  <input class="border rounded p-1" name="pattern" placeholder="e.g. marketing.example.com" required />
  <select name="action" class="border rounded p-1">
    <option value="ignore">ignore (just tag)</option>
    <option value="auto_archive">auto archive</option>
    <option value="auto_trash">auto trash</option>
  </select>
  <button class="px-3 py-1 bg-blue-600 text-white rounded">Add</button>
</form>

<table class="w-full bg-white border rounded text-sm">
  <thead class="bg-gray-100"><tr class="text-left">
    <th class="p-2">Kind</th><th class="p-2">Match</th><th class="p-2">Pattern</th>
    <th class="p-2">Action</th><th class="p-2">Notes</th><th class="p-2"></th>
  </tr></thead>
  <tbody>
  {% for r in rules %}
    <tr class="border-t">
      <td class="p-2">{{ r.kind }}</td>
      <td class="p-2">{{ r.match_kind }}</td>
      <td class="p-2 font-mono text-xs">{{ r.pattern }}</td>
      <td class="p-2">{{ r.action }}</td>
      <td class="p-2 text-xs text-gray-600">{{ r.notes or '' }}</td>
      <td class="p-2">
        <form method="post" action="/rules/{{ r.id }}/delete">
          <button class="text-xs text-red-700 hover:underline">delete</button>
        </form>
      </td>
    </tr>
  {% else %}
    <tr><td colspan="6" class="p-4 text-center text-gray-500">No rules yet.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
